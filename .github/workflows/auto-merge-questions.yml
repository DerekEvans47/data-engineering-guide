name: Auto-merge Question Generation PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Runs on every PR — strips session URLs and forbidden footers from the body
  sanitize-pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Strip session URLs and forbidden footers
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;

            const FORBIDDEN = [
              /claude\.ai\/code\/session[^\s]*/gi,
              /Claude-Session:[^\n]*/gi,
              /_?Generated (by|with) \[?Claude Code\]?[^\n]*/gi,
              /https?:\/\/claude\.ai[^\s]*/gi,
            ];

            let body = pr.body || '';
            let changed = false;

            for (const pattern of FORBIDDEN) {
              const cleaned = body.replace(pattern, '').replace(/\n{3,}/g, '\n\n');
              if (cleaned !== body) { body = cleaned; changed = true; }
            }

            if (changed) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: body.trim(),
              });
              console.log(`PR #${pr.number}: removed forbidden content from body.`);
            } else {
              console.log(`PR #${pr.number}: body is clean.`);
            }

  # Runs only on questions/* branches within the allowed file scope
  check-and-merge:
    runs-on: ubuntu-latest
    needs: sanitize-pr-body
    steps:
      - name: Check branch and changed files
        id: changed
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref;
            const isQuestionsBranch = branch.startsWith('questions/');

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const ALLOWED = [
              'content/question-bank.json',
              'learn/drill/sw.js',
              'CHANGELOG.md',
            ];

            const allInScope = files.every(f => ALLOWED.includes(f.filename));

            console.log(`Branch: ${branch}`);
            console.log(`Is questions/* branch: ${isQuestionsBranch}`);
            console.log(`Changed files (${files.length}):`);
            files.forEach(f => console.log(`  ${f.filename}`));
            console.log(`All changes within allowed scope: ${allInScope}`);

            const eligible = isQuestionsBranch && allInScope;
            console.log(`Eligible for auto-merge: ${eligible}`);

            core.setOutput('eligible', String(eligible));

      - name: Merge eligible questions PR
        if: steps.changed.outputs.eligible == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'Auto-approved: questions/* branch within allowed file scope.',
            });

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
              commit_title: pr.title,
              commit_message: 'Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>',
            });

            console.log(`PR #${pr.number} approved and merged.`);

      - name: Skip — not eligible for auto-merge
        if: steps.changed.outputs.eligible == 'false'
        run: |
          echo "PR not eligible for auto-merge (must be a questions/* branch touching only content/question-bank.json, learn/drill/sw.js, or CHANGELOG.md)."
          echo "Manual review required."
